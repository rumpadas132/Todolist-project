services:
  - type: web
    name: todolist-api
    runtime: node
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: npm run start -w server
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: MONGODB_URI
        # Required: set this in Render to your MongoDB Atlas connection string.
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_ORIGIN
        fromService:
          type: web
          name: todolist-web
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: todolist-web
    runtime: static
    plan: free
    buildCommand: npm ci && npm run build -w client
    staticPublishPath: client/dist
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_ORIGIN
        fromService:
          type: web
          name: todolist-api
          envVarKey: RENDER_EXTERNAL_URL
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
